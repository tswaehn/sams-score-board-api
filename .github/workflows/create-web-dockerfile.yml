name: Create Web Dockerfile

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - web/package.json
      - web/package-lock.json
      - .github/workflows/create-web-dockerfile.yml

permissions:
  contents: write

jobs:
  create-dockerfile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate web/Dockerfile
        run: |
          cat <<'EOF' > web/Dockerfile
          # This file is generated by .github/workflows/create-web-dockerfile.yml.
          # Any manual edits may be overwritten.
          #
          # Build stage
          FROM node:22-alpine AS build
          WORKDIR /app

          COPY package.json ./
          RUN npm install

          COPY . .
          RUN npm run build

          # Serve stage
          FROM nginx:1.27-alpine
          COPY --from=build /app/dist /usr/share/nginx/html

          # SPA fallback
          RUN printf 'server {\n  listen 80;\n  server_name _;\n  root /usr/share/nginx/html;\n  index index.html;\n  location / {\n    try_files $uri /index.html;\n  }\n}\n' > /etc/nginx/conf.d/default.conf

          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Commit generated Dockerfile
        run: |
          if git diff --quiet -- web/Dockerfile; then
            echo "web/Dockerfile is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/Dockerfile
          git commit -m "chore: regenerate web Dockerfile"
          git push
