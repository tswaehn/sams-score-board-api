document:
  name: concept.yml
  purpose:
    - canonical machine-readable concept/context file for the client-api subproject
    - warm-up context for new Codex sessions before making changes in client-api
    - continuously maintained summary that must be updated when client-api behavior, structure, or constraints change
  scope:
    primary_subproject: client-api
    repository_root: /home/tswaehn/src/metagons-software.de/sams-scoreboard-api
  maintenance_policy:
    update_required_when:
      - API routes change
      - environment variables change
      - runtime behavior changes
      - caching behavior changes
      - websocket/live behavior changes
      - file structure or ownership in client-api changes
      - operational constraints or known risks change
    intended_usage:
      - read first when starting a fresh Codex context
      - treat as the latest high-level concept source for client-api
      - reconcile with source files if implementation and this document diverge
  last_updated:
    date: 2026-04-03
    author: Codex

subproject:
  name: client-api
  type: python-service
  runtime:
    language: Python
    container_base: python:3.13-slim
    entrypoint_file: client-api/server.py
    container_command:
      - python
      - server.py
  dependencies:
    file: client-api/requirements.txt
    packages:
      - requests
      - fastapi
      - uvicorn
      - websocket-client

files:
  root:
    - path: client-api/server.py
      role: FastAPI application, routing, middleware, exception shaping, uvicorn bootstrap
    - path: client-api/sams_api_client.py
      role: upstream SSVB API client, pagination, rate limiting, direct upstream fetch helper used by the service runtime, and shared URL/UUID extraction helpers
    - path: client-api/shared/fetch_association.py
      role: Association class with in-process association store, update_all() preload, get(uuid) lookup using direct upstream fetches, and a background updater thread
    - path: client-api/shared/fetch_season.py
      role: Season class with in-process season store, update_all() preload, get(uuid) lookup using direct upstream fetches, and a background updater thread
    - path: client-api/shared/fetch_teams.py
      role: Teams class with an in-process global team store keyed by team uuid, update_all() via /teams, get(uuid) via direct upstream fetches, and a background updater thread
    - path: client-api/competition/fetch_competition_team.py
      role: CompetitionTeams class using the shared updater/store base with a competition-uuid-keyed team-list store, get(competition_uuid), and update_all() that refreshes competition-scoped teams by iterating competitions
    - path: client-api/competition/fetch_competition_match_group.py
      role: MatchGroup class using the shared updater/store base with persisted raw competition-scoped match-group storage and get(competition_uuid, current_season) returning the normalized competition match-group shape including normalized matches
    - path: client-api/competition/fetch_competition_matches.py
      role: CompetitionMatch class using the shared updater/store base with persisted raw competition-match storage, get(uuid), and get_by_match_group_uuid() returning normalized competition matches
    - path: client-api/competition/fetch_competition_ranking.py
      role: CompetitionRanking class using the shared updater/store base with persisted normalized competition-ranking storage, get(competition_uuid), and update_all() that refreshes rankings by iterating competitions with direct endpoint fetches
    - path: client-api/periodic_updater.py
      role: shared base class for daemon updater threads that run on startup only when the persisted store TTL has expired and then nightly at local time 01:00, for the primary in-memory store plus lock used by derived store classes, and for pretty-printed persisted JSON snapshots plus raw reference dumps with timestamps
    - path: client-api/competition/fetch_competition.py
      role: Competition class with in-process raw competition store, update_all() preload, get(uuid) lookup using direct upstream fetches, and a composition helper that builds the full competition payload from multiple endpoint-backed stores
    - path: client-api/competition/fetch_competition_list.py
      role: CompetitionListStore class maintains the aggregated competition list and lock, updates it per season using direct upstream fetches, exposes get() for copied reads, derives currentSeason mutability from the loaded season, and runs a background updater thread
    - path: client-api/live_endpoint.py
      role: live snapshot fetch plus websocket update loop for /api/live/{competition_id}
    - path: client-api/warm_cache.py
      role: fetches unique season records via competition season links and reports season date ranges for cache TTL analysis
    - path: client-api/test.py
      role: ad hoc manual script for dumping cached payloads and warming cache
    - path: client-api/Dockerfile
      role: container build definition
    - path: client-api/cache/
      role: persistent on-disk cache directory; large and expected as part of runtime behavior

api_surface:
  framework: FastAPI
  routes:
    - method: GET
      path: /api/health
      purpose: health check
      response_shape:
        status: ok
        requestId: string
    - method: GET
      path: /api/healthz
      purpose: alias for health check
      response_shape:
        status: ok
        requestId: string
    - method: GET
      path: /api/competition/{competition_id}
      params:
        competition_id:
          type: UUID
      purpose: return assembled competition payload
      data_source:
        - competitions/{competition_id}
        - associations/{association_uuid}
        - seasons/{season_uuid}
        - competitions/{competition_id}/match-groups
        - match-groups/{match_group_uuid}/competition-matches
        - competitions/{competition_id}/teams
        - competitions/{competition_id}/rankings
    - method: GET
      path: /api/competition-list
      purpose: return enriched competition list aggregated by updating all seasons
      response_wrapper:
        data: list
        requestId: string
    - method: GET
      path: /api/live/{competition_id}
      purpose: return current live payload from snapshot plus websocket updates

http_behavior:
  lifecycle:
    startup:
      mechanism: FastAPI lifespan handler
      details:
        - requires LIVE_API_URLS to be configured
        - starts one live endpoint updater per configured upstream URL
        - raises startup errors so FastAPI fails to start instead of serving with an uninitialized live endpoint
  middleware:
    - name: request-id
      details:
        request_header: X-Request-Id
        generated_when_missing: true
        response_header: X-Request-Id
    - name: response-hardening
      details:
        cache_control: no-store
        x_content_type_options: nosniff
    - name: cors
      details:
        allow_origins:
          - "*"
        allow_credentials: false
        allow_methods:
          - "*"
        allow_headers:
          - "*"
  exception_contract:
    validation_error:
      status: 422
      body_keys:
        - error.code
        - error.message
        - error.details
        - requestId
    http_exception:
      status: passthrough
      body_keys:
        - error.code
        - error.message
        - requestId
    unhandled_exception:
      status: 502
      default_message: Failed to fetch competition data

environment:
  variables:
    - name: HOST
      required: false
      default: 0.0.0.0
      used_by:
        - client-api/server.py
    - name: PORT
      required: false
      default: "8000"
      used_by:
        - client-api/server.py
    - name: LOG_LEVEL
      required: false
      default: info
      used_by:
        - client-api/server.py
    - name: TZ
      required: false
      used_by:
        - client-api/server_config.py
      purpose: set the process timezone, mainly for daily refresh scheduling based on datetime.now()
    - name: SSVB_API_KEY
      required: true
      used_by:
        - client-api/sams_api_client.py
      purpose: authenticate requests against https://www.ssvb.org/api/v2
    - name: LIVE_API_URLS
      required: true_for_live_route
      used_by:
        - client-api/live_endpoint.py
      format: comma-separated list of LIVE_API_URL-compatible values
      purpose: configure one or more upstream live sources whose payloads are merged before serving
    - name: LIVE_API_SNAPSHOT_REFRESH_SECONDS
      required: false
      default: 60
      used_by:
        - client-api/live_endpoint.py
      purpose: periodically refresh the full live snapshot inside the live updater so matchDays and matchSeries stay aligned with upstream while websocket deltas update match state
    - name: WRITE_RAW_CACHE
      required: false
      default: false
      used_by:
        - client-api/server_config.py
        - client-api/periodic_updater.py
      purpose: enable or disable writing raw upstream cache dump files alongside normalized cache stores
    - name: INFLUXDB_ENABLED
      required: false
      default: false
      used_by:
        - client-api/server_config.py
        - client-api/metrics.py
      purpose: enable or disable optional InfluxDB metrics export
    - name: INFLUXDB_URL
      required: false
      used_by:
        - client-api/server_config.py
        - client-api/metrics.py
      purpose: base URL of the InfluxDB server for metrics export
    - name: INFLUXDB_ORG
      required: false
      used_by:
        - client-api/server_config.py
        - client-api/metrics.py
      purpose: InfluxDB organization name used for metrics writes
    - name: INFLUXDB_BUCKET
      required: false
      used_by:
        - client-api/server_config.py
        - client-api/metrics.py
      purpose: InfluxDB bucket used for metrics writes
    - name: INFLUXDB_TOKEN
      required: false
      used_by:
        - client-api/server_config.py
        - client-api/metrics.py
      purpose: InfluxDB token used for authenticated metrics writes
    - name: INFLUXDB_TIMEOUT_SECONDS
      required: false
      default: 1.0
      used_by:
        - client-api/server_config.py
        - client-api/metrics.py
      purpose: timeout for best-effort InfluxDB write calls
    - name: SERVER_CONFIG_PATH
      required: true_for_client_api_startup
      used_by:
        - client-api/server_config.py
      purpose: point to a JSON file that defines the client-api runtime configuration
    - name: SSVB_API_KEY
      required: true_for_upstream_rest_requests
      used_by:
        - client-api/sams_api_client.py
      purpose: authenticate requests to the upstream SAMS REST API

upstream_integrations:
  ssvb_rest_api:
    base_url: https://www.ssvb.org/api/v2
    auth:
      header: X-Api-Key
      source_env: SSVB_API_KEY
    request_characteristics:
      pagination:
        size: 9999
        page_param: true
      pacing:
        min_delay_seconds_between_requests: 0.3
      timeout_seconds: 30
      direct_fetch_helper:
        function: fetch_endpoint_direct(endpoint)
        behavior: fetches upstream data immediately without a separate raw endpoint-cache layer
  live_api:
    transport:
      snapshot: HTTP GET
      updates: WebSocket
    source_env: LIVE_API_URLS
    source_cardinality: one_or_many
    websocket_url_derivation: replace /live/<ticker_type>/tickers/<ticker_id> with wss://<host>/<ticker_type>/<ticker_id>
    http_timeout_seconds: 30
    websocket_timeout_seconds: 55
    reconnect_delay_seconds: 3
    snapshot_refresh_seconds:
      default: 60
      source_env: LIVE_API_SNAPSHOT_REFRESH_SECONDS

caching:
  primary_module: client-api/periodic_updater.py
  model:
    base_class: PeriodicUpdater
    rule: updater-backed stores persist normalized data to disk and decide freshness from store-level or item-level timestamps
    ttl_policy:
      short_lived_store_ttl_seconds: 60
      long_lived_store_ttl_seconds: 86400
  cache_storage:
    type:
      - in-memory updater-backed dictionaries
      - on-disk JSON store snapshots for updater-backed stores
    directory: client-api/cache
    updater_store_snapshot_shape:
      file_pattern: cache/*-store.json
      top_level_keys:
        - storedAt
        - store
        - storeItemStoredAt
      formatting: pretty-printed JSON
    updater_raw_dump_shape:
      file_pattern: cache/*-raw*.json
      contents: original raw upstream payload as pretty-printed JSON without the updater snapshot wrapper
  initialization:
    trigger: module import
    function: PeriodicUpdater.load_store()
    side_effects:
      - creates cache directory if missing
      - loads persisted updater-backed store snapshots into memory
  concurrency:
    global_store_lock: RLock
    inflight_update_deduplication: inflight_updates[uuid or __all__]
    behavior:
      - concurrent refreshes for the same uuid or full-store update wait on the same event
      - refreshed payload is persisted before waiting callers continue
  logging:
    upstream_client_logger: api
    updater_loggers:
      - competition-api.association
      - competition-api.season
      - competition-api.teams
      - competition-api.competition
      - competition-api.competition-list
      - competition-api.competition-ranking
      - competition-api.match-group
      - competition-api.competition-match
      - competition-api.competition-teams
      - competition-api.league
      - competition-api.league-list
      - competition-api.league-match-day
      - competition-api.league-match
      - competition-api.league-ranking

live_state_model:
  module: client-api/live_endpoint.py
  owner:
    classes:
      source_updater: LiveStateUpdater
      aggregate_updater: MultiLiveStateUpdater
    singleton: LIVE_STATE_UPDATER
  state:
    payload: one in-memory dict per source updater, merged on read
    error: source-updater-owned string or null
    websocket_thread: one daemon thread per source updater or null
  startup_sequence:
    - validate LIVE_API_URLS
    - start one updater thread per configured source
  aggregate_merge_rules:
    - concatenate matchDays arrays from all sources
    - shallow-merge matchSeries, matchStates, and matchStats by key
    - use the first available settings object
  websocket_merge_rules:
    - FETCH_DATA_RESPONSE_ERROR sets error state
    - MATCH_UPDATE merges payload into matchStates[matchUuid]
    - MATCH_STATS_UPDATE merges payload into matchStats[matchUuid]
  updater_behavior:
    - the updater is the only component allowed to fetch or mutate live state
    - the updater refreshes the full snapshot before opening the websocket and again every LIVE_API_SNAPSHOT_REFRESH_SECONDS
    - websocket messages are treated as deltas layered onto the stored snapshot
    - if no snapshot is available yet, endpoint reads return an empty dict
  live_endpoint_behavior:
    - GET /api/live/{competition_id} reads only from the updater public API
    - GET /api/live/{competition_id} does not start or repair the updater lifecycle
    - GET /api/live/{competition_id} filters matchDays, matchStates, matchStats, and matchSeries server-side to the requested competition while preserving the live payload shape

configuration_model:
  module: client-api/server_config.py
  source_precedence:
    - JSON file referenced by SERVER_CONFIG_PATH
    - hard-coded defaults
  startup_validation:
    - fail startup when SERVER_CONFIG_PATH is missing
    - fail startup when the config file does not exist
    - fail startup when the config file is not valid JSON
    - fail startup when ssvb_api_key is missing or empty
    - fail startup when live_api_urls is missing or empty
  supported_keys:
    - tz
    - host
    - port
    - log_level
    - write_raw_cache
    - influxdb.enabled
    - influxdb.url
    - influxdb.org
    - influxdb.bucket
    - influxdb.token
    - influxdb.timeout_seconds
    - ssvb_api_key
    - live_api_urls
    - live_api_snapshot_refresh_seconds

payload_shapes:
  competition_endpoint_top_level_keys:
    - competition
    - association
    - season
    - match-groups
    - teams
    - rankings
  competition_summary_fields:
    - uuid
    - name
    - gender
    - association_uuid
    - season_uuid
    - match_groups_uuid
    - teams_uuid
    - rankings_uuid
  association_access:
    - Association.update_all(current_season=None) loads and stores all associations by uuid using direct upstream fetches
    - Association.get(uuid, current_season=None) returns a cached in-process association or fetches a single association directly from upstream on demand
    - Association starts a daemon thread during construction, runs update_all() once on startup, and refreshes again daily at local time 01:00
    - Association uses the base-class store as its uuid-keyed in-memory association map
    - Association persists its store snapshot to cache/association-store.json with a storedAt timestamp
    - Association dumps the raw /associations payload to cache/association-store-raw.json when refreshing the store
    - Association startup refresh is skipped when the persisted store snapshot is newer than the base TTL
  season_access:
    - Season.update_all(current_season=None) loads and stores all seasons by uuid using direct upstream fetches
    - Season.get(uuid, current_season=None) returns a cached in-process season or fetches a single season directly from upstream on demand
    - Season starts a daemon thread during construction, runs update_all() once on startup, and refreshes again daily at local time 01:00
    - Season uses the base-class store as its uuid-keyed in-memory season map
    - Season persists its store snapshot to cache/season-store.json with a storedAt timestamp
    - Season dumps the raw /seasons payload to cache/season-store-raw.json when refreshing the store
    - Season startup refresh is skipped when the persisted store snapshot is newer than the base TTL
  teams_access:
    - Teams.get(uuid, current_season=None) returns a cached in-process team or fetches a single team directly from upstream on demand
    - Teams.update_all(current_season=None) refreshes the global team list using /teams
    - Teams starts a daemon thread during construction, runs update_all() once on startup, and refreshes again daily at local time 01:00
    - Teams uses the base-class store as its uuid-keyed global team map
    - Teams persists its global team store snapshot to cache/teams-store.json with a storedAt timestamp
    - Teams dumps the raw /teams payload to cache/teams-store-raw.json when refreshing the store
    - Teams startup refresh is skipped when the persisted store snapshot is newer than the base TTL
  competition_teams_access:
    - CompetitionTeams.get(competition_uuid, current_season=None) returns cached competition-scoped teams or fetches them directly from upstream on demand
    - CompetitionTeams.update_all(current_season=None) refreshes competition-scoped teams by iterating CompetitionListStore.get() and fetching /competitions/{uuid}/teams
    - CompetitionTeams starts a daemon thread during construction, runs update_all() once on startup, and refreshes again daily at local time 01:00
    - CompetitionTeams uses the base-class store as its competition-uuid-keyed in-memory team-list map
    - CompetitionTeams persists its store snapshot to cache/competition-teams-store.json with a storedAt timestamp
    - CompetitionTeams dumps raw /competitions/{uuid}/teams payloads to cache for reference when replacing a competition teams entry
  match_group_access:
    - MatchGroup.get(uuid, current_season) returns a normalized single match-group object while storing the raw upstream match-group payload internally
    - MatchGroup.get(competition_uuid, current_season) returns the normalized competition match-group map keyed by match-group name while storing raw upstream match-group payloads internally
    - match data inside the normalized return value is loaded through CompetitionMatch.get_by_match_group_uuid()
    - normalized match-group entries expose finished=true only when every normalized child match has verified=true; empty match sets remain finished=false
    - MatchGroup uses the same base-class store pattern as Season, including persisted raw store snapshots and TTL-aware startup refresh behavior
    - MatchGroup dumps raw /match-groups and /competitions/{uuid}/match-groups payloads to cache for reference when replacing the store
  competition_access:
    - Competition.update_all(current_season=None) loads and stores all competitions by uuid using direct upstream fetches
    - Competition.get(uuid, current_season=None) returns a cached in-process competition or fetches a single competition directly from upstream on demand
    - Competition starts a daemon thread during construction, runs update_all() once on startup, and refreshes again daily at local time 01:00
    - Competition uses the base-class store as its uuid-keyed in-memory competition map
    - Competition persists its store snapshot to cache/competition-store.json with a storedAt timestamp
    - Competition dumps the raw /competitions payload to cache/competition-store-raw.json when refreshing the store
    - Competition startup refresh is skipped when the persisted store snapshot is newer than the base TTL
    - competition.fetch_competition.get(uuid) returns the assembled API response plus a cache-hit flag, and uses get_competition(raw_competition) as the composition helper around Competition.get(uuid), Season.get(uuid), Association.get(uuid), MatchGroup.get(), CompetitionTeams.get(uuid), and CompetitionRanking.get(uuid)
  competition_ranking_access:
    - CompetitionRanking.update_all(current_season=None) refreshes rankings for all stored competitions by iterating CompetitionListStore.get() and fetching /competitions/{uuid}/rankings directly
    - CompetitionRanking.get(competition_uuid, current_season) returns cached normalized rankings for a competition or fetches and stores them on demand
    - CompetitionRanking uses the base-class store as its competition-uuid-keyed in-memory ranking map
    - CompetitionRanking persists its store snapshot to cache/competition-ranking-store.json with a storedAt timestamp
    - CompetitionRanking dumps raw /competitions/{uuid}/rankings payloads to cache for reference when replacing a competition ranking entry
  competition_match_access:
    - CompetitionMatch.get(uuid, current_season) returns a normalized single competition match while storing the raw upstream competition-match payload internally
    - CompetitionMatch.get_by_match_group_uuid(match_group_uuid, current_season) returns normalized competition matches keyed by match uuid while storing raw upstream competition-match payloads internally
    - normalized competition matches retain the upstream verified flag so parent match-groups can derive finished state from child matches
    - CompetitionMatch uses the same base-class store pattern as Season, including persisted raw store snapshots and TTL-aware startup refresh behavior
    - CompetitionMatch dumps raw /competition-matches and /match-groups/{uuid}/competition-matches payloads to cache for reference when replacing the store
  league_match_day_access:
    - LeagueMatchDayStore.get(league_uuid) returns normalized match-days keyed by display name and each entry exposes finished=true only when every normalized child match has verified=true; empty match sets remain finished=false
  league_match_access:
    - normalized league matches retain the upstream verified flag so parent match-days can derive finished state from child matches
  competition_list_item_fields:
    - uuid
    - name
    - gender
    - shortname
    - currentSeason
    - association_url
    - season_url
    - association
    - season
  competition_list_update_flow:
    - CompetitionListStore inherits the daemon updater thread behavior from PeriodicUpdater and provides its refresh implementation by overriding the base update_all() hook
    - CompetitionListStore uses the base-class store as its primary competition-by-uuid map and keeps the season-to-competition index locally
    - the background thread calls update_all() once on startup
    - the startup refresh runs only when the persisted store snapshot is missing or older than the base TTL
    - after the startup refresh, the thread schedules the next refresh for local time 01:00 and repeats daily
    - CompetitionListStore.update_all() uses Season.update_all() and iterates all seasons
    - CompetitionListStore.update_competition_list_by_season(season_uuid) uses Season.get(uuid)
    - CompetitionListStore.update_competition_list_by_season(season_uuid) fetches /competitions?season=<uuid>
    - loaded season currentSeason value is copied to each competition entry of that season
    - a process-global CompetitionListStore instance keeps the aggregated competition list keyed by competition uuid
    - rerunning a season update replaces that season slice in the store state
    - CompetitionListStore fetches seasons and competitions directly from upstream
    - CompetitionListStore.get() returns a deep-copied list of all stored competitions
    - CompetitionListStore persists its primary store snapshot to cache/competition-list-store.json with a storedAt timestamp and rebuilds the season index from the persisted store on load
    - CompetitionListStore dumps the raw /competitions?season=<uuid> payload for each refreshed season to cache for reference when replacing the store

operational_notes:
  strengths:
    - small codebase with clear module split
    - cache files allow warm startup behavior without immediate upstream refetch
    - updater-backed stores deduplicate concurrent refreshes per entity key
    - live route can recover from websocket disconnects by reconnect loop
  constraints:
    - import-time side effects exist in sams_api_client.py
    - cache directory is large and should be treated as normal runtime state, not noise
    - cache TTL varies by updater-backed module, primarily 60 seconds or 24 hours
    - test.py is a manual utility script, not an automated test suite
    - project uses plain module imports rather than a packaged Python module structure
    - the global /teams endpoint does not expose competition UUIDs in TeamDto, so competition-scoped team lists need a separate store backed by /competitions/{uuid}/teams
  verified_in_current_context:
    - python3 -m py_compile client-api/*.py succeeded on 2026-04-03
  local_environment_note:
    - shell environment had python3 available, but not python on PATH during verification

codex_warmup_guidance:
  read_order:
    - concept.yml
    - client-api/server.py
    - client-api/periodic_updater.py
    - client-api/sams_api_client.py
    - client-api/competition/fetch_competition.py
    - client-api/live_endpoint.py
  focus_assumption:
    - unless stated otherwise, ongoing work should prioritize the client-api subproject
  update_instruction:
    - whenever client-api changes materially, update this document in the same workstream
